name: Build Windows x64 (binaire léger)

# Produit un binaire unique WinGhost.exe (x64) via PyInstaller.
#   • AUTOMATIQUEMENT à chaque push sur main (artefact téléchargeable)
#   • à la demande (workflow_dispatch)
#   • à chaque tag v* → publication d'une Release avec l'exe attaché
#
# Build LÉGER : EasyOCR / PyTorch ne sont PAS embarqués (cf. winghost.spec).
# PyInstaller ne cross-compile pas → ce job DOIT tourner sur windows-latest.

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # nécessaire pour créer la Release sur tag

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Vérifier la cohérence des versions (version.py == pyproject.toml)
        shell: pwsh
        run: |
          $appVer = python -c "from version import __version__ as v; print(v)"
          $pyproj = python -c "import re; print(re.search(r'version\s*=\s*\"([^\"]+)\"', open('pyproject.toml', encoding='utf-8').read()).group(1))"
          Write-Host "version.py = $appVer ; pyproject.toml = $pyproj"
          if ($appVer -ne $pyproj) {
            Write-Error "Incohérence de version : version.py ($appVer) != pyproject.toml ($pyproj)"
            exit 1
          }

      - name: Build single-file binary
        run: pyinstaller --noconfirm --clean winghost.spec

      - name: Smoke test (le binaire démarre / --version sans planter)
        shell: pwsh
        run: |
          if (-Not (Test-Path dist/WinGhost.exe)) {
            Write-Error "dist/WinGhost.exe introuvable"; exit 1
          }
          $size = (Get-Item dist/WinGhost.exe).Length / 1MB
          Write-Host ("Binaire produit : {0:N1} Mo" -f $size)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinGhost-windows-x64
          path: dist/WinGhost.exe
          if-no-files-found: error

      - name: Publish to Release (sur tag uniquement)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WinGhost.exe
          fail_on_unmatched_files: true
