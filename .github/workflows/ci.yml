name: CI — WinGhost Monitor

# Vérifie la cohérence des versions, la compilation et la chaîne KPI (sans IHM).
# Tourne sur Linux : les couches Recorder/Replayer (écran, OpenCV, pynput) ne
# sont pas exécutées ici, seules les couches de données sont testées.

on:
  push:
    branches: [main, "redesign/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cohérence des versions (version.py == pyproject.toml)
        run: python tools/check_version.py

      - name: Installer les dépendances de test
        run: |
          python -m pip install --upgrade pip
          pip install numpy pytest

      - name: Compilation (syntaxe de tous les modules)
        run: |
          python -m py_compile version.py tools/check_version.py
          python -m py_compile winmonitor/*.py winmonitor/recorder/*.py \
            winmonitor/replayer/*.py winmonitor/kpi/*.py winmonitor/scheduler/*.py

      - name: Test de fumée (chaîne KPI sans IHM)
        run: python -m pytest tests/ -q
